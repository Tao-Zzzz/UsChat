<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>RTC Call</title>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #111;
    overflow: hidden;
}
#root {
    position: relative;
    width: 100%;
    height: 100%;
    background: #000;
}
#remoteVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #222;
}
#localVideo {
    position: absolute;
    right: 16px;
    top: 16px;
    width: 180px;
    height: 130px;
    object-fit: cover;
    background: #444;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.25);
}
#status {
    position: absolute;
    left: 12px;
    top: 12px;
    z-index: 10;
    color: white;
    background: rgba(0,0,0,0.4);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 14px;
}
</style>
</head>
<body>
<div id="root">
    <div id="status">初始化中...</div>
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
</div>

<script>
let bridge = null;
let pc = null;
let localStream = null;
let started = false;
let role = null;
let pendingIce = [];

const remoteVideo = document.getElementById('remoteVideo');
const localVideo = document.getElementById('localVideo');
const statusEl = document.getElementById('status');

function setStatus(text) {
    statusEl.innerText = text;
}

async function ensureMedia() {
    if (localStream) return localStream;
    localStream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
    });
    localVideo.srcObject = localStream;
    return localStream;
}

async function ensurePc() {
    if (pc) return pc;

    pc = new RTCPeerConnection({
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' }
        ]
    });

    pc.onicecandidate = (event) => {
        if (!event.candidate || !bridge) return;
        bridge.jsSendIce(
            event.candidate.candidate,
            event.candidate.sdpMid || "",
            event.candidate.sdpMLineIndex || 0
        );
    };

    pc.ontrack = (event) => {
        if (event.streams && event.streams[0]) {
            remoteVideo.srcObject = event.streams[0];
        }
    };

    pc.onconnectionstatechange = () => {
        setStatus("连接状态: " + pc.connectionState);
        if (pc.connectionState === "connected" && bridge) {
            bridge.jsNotifyConnected();
        }
    };

    const stream = await ensureMedia();
    stream.getTracks().forEach(track => {
        pc.addTrack(track, stream);
    });

    // 补加之前提前收到的 ICE
    if (pendingIce.length > 0) {
        for (const item of pendingIce) {
            try {
                await pc.addIceCandidate(item);
            } catch (e) {
                console.error(e);
            }
        }
        pendingIce = [];
    }

    return pc;
}

async function startCaller() {
    if (started) return;
    started = true;
    role = "caller";
    setStatus("正在创建 Offer...");
    const peer = await ensurePc();
    const offer = await peer.createOffer();
    await peer.setLocalDescription(offer);
    bridge.jsSendOffer(offer.sdp);
    setStatus("Offer 已发送");
}

async function startCallee() {
    if (started) return;
    started = true;
    role = "callee";
    await ensurePc();
    setStatus("等待主叫 Offer...");
}

async function setRemoteOffer(sdp) {
    const peer = await ensurePc();
    await peer.setRemoteDescription({ type: "offer", sdp: sdp });
    const answer = await peer.createAnswer();
    await peer.setLocalDescription(answer);
    bridge.jsSendAnswer(answer.sdp);
    setStatus("Answer 已发送");
}

async function setRemoteAnswer(sdp) {
    const peer = await ensurePc();
    await peer.setRemoteDescription({ type: "answer", sdp: sdp });
    setStatus("远端 Answer 已设置");
}

async function addRemoteIce(candidate, sdpMid, sdpMLineIndex) {
    const ice = {
        candidate: candidate,
        sdpMid: sdpMid,
        sdpMLineIndex: sdpMLineIndex
    };

    if (!pc || !pc.remoteDescription) {
        pendingIce.push(ice);
        return;
    }

    try {
        await pc.addIceCandidate(ice);
    } catch (e) {
        console.error(e);
    }
}

function doHangup(notifyQt) {
    if (pc) {
        pc.getSenders().forEach(sender => {
            if (sender.track) sender.track.stop();
        });
        pc.close();
        pc = null;
    }

    if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
    }

    remoteVideo.srcObject = null;
    localVideo.srcObject = null;
    started = false;
    pendingIce = [];
    setStatus("通话已结束");

    if (notifyQt && bridge) {
        bridge.jsNotifyHangup();
    }
}

new QWebChannel(qt.webChannelTransport, function(channel) {
    bridge = channel.objects.WebRtcJsBridge;

    bridge.qtStartCaller.connect(function() {
        startCaller().catch(function(e) {
            bridge.jsNotifyError(String(e));
        });
    });

    bridge.qtStartCallee.connect(function() {
        startCallee().catch(function(e) {
            bridge.jsNotifyError(String(e));
        });
    });

    bridge.qtSetRemoteOffer.connect(function(sdp) {
        setRemoteOffer(sdp).catch(function(e) {
            bridge.jsNotifyError(String(e));
        });
    });

    bridge.qtSetRemoteAnswer.connect(function(sdp) {
        setRemoteAnswer(sdp).catch(function(e) {
            bridge.jsNotifyError(String(e));
        });
    });

    bridge.qtAddRemoteIce.connect(function(candidate, sdpMid, sdpMLineIndex) {
        addRemoteIce(candidate, sdpMid, sdpMLineIndex).catch(function(e) {
            bridge.jsNotifyError(String(e));
        });
    });

    bridge.qtHangup.connect(function() {
        doHangup(false);
    });

    bridge.jsReady();
    setStatus("页面已就绪");
});
</script>
</body>
</html>
